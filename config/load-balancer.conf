# ===========================================
# YYC3 智慧商家管理系统 - 负载均衡配置
# 适用于: AWS ALB / Nginx / Cloudflare
# ===========================================

# AWS Application Load Balancer 配置示例
# ----------------------------------------

## ALB 基础配置
resource "aws_lb" "yyc3_alb" {
  name               = "yyc3-dashboard-alb"
  internal           = false
  load_balancer_type = "application"
  security_groups    = [aws_security_group.alb.id]
  subnets            = aws_subnet.public[*].id

  enable_deletion_protection = true

  access_logs {
    bucket  = aws_s3_bucket.alb_logs.bucket
    prefix  = "yyc3-alb-logs"
    enabled = true
  }

  tags = {
    Name        = "yyc3-dashboard-alb"
    Environment = terraform.workspace
    Project     = "YYC3-Dashboard"
  }
}

## 目标组配置 (Target Group)
resource "aws_lb_target_group" "yyc3_tg" {
  name     = "yyc3-dashboard-tg"
  port     = 3000
  protocol = "HTTP"
  vpc_id   = aws_vpc.main.id

  health_check {
    enabled             = true
    healthy_threshold   = 2
    interval            = 30
    matcher             = "200-399"
    path                = "/api/health"
    port                = "traffic-port"
    timeout             = 5
    unhealthy_threshold = 3
  }

  stickiness {
    type    = "lb_cookie"
    enabled = true
    cookie_duration = 86400
  }

  tags = {
    Name = "yyc3-dashboard-tg"
  }
}

## 监听器配置 (Listener)
resource "aws_lb_listener" "https" {
  load_balancer_arn = aws_lb.yyc3_alb.arn
  port              = 443
  protocol          = "HTTPS"
  ssl_policy        = "ELBSecurityPolicy-TLS-1-2-2017-01"
  certificate_arn   = aws_acm_certificate.cert.arn

  default_action {
    type             = "forward"
    target_group_arn = aws_lb_target_group.yyc3_tg.arn
  }
}

# HTTP → HTTPS 重定向
resource "aws_lb_listener" "http" {
  load_balancer_arn = aws_lb.yyc3_alb.arn
  port              = 80
  protocol          "HTTP"

  default_action {
    type = "redirect"

    redirect {
      port        = "443"
      protocol    = "HTTPS"
      status_code = "HTTP_301"
    }
  }
}

# 自动扩缩容策略
# -----------------

## 目标跟踪扩缩容策略
resource "aws_autoscaling_policy" "yyc3_scale_up" {
  name                   = "yyc3-scale-up-cpu"
  scaling_adjustment     = 1
  adjustment_type        = "ChangeInCapacity"
  cooldown               = 300
  autoscaling_group_name = aws_autoscaling_group.yyc3.name

  metric_aggregation_type = "Average"

  target_tracking_configuration {
    predefined_metric_specification {
      predefined_metric_type = "ASGAverageCPUUtilization"
    }

    target_value = 70.0
  }
}

# Nginx 负载均衡配置（传统部署）
# ------------------------------

upstream yyc3_backend {
  least_conn;

  server 10.0.1.10:3000 weight=5 max_fails=3 fail_timeout=30s;
  server 10.0.1.11:3000 weight=5 max_fails=3 fail_timeout=30s;
  server 10.0.1.12:3000 weight=3 max_fails=3 fail_timeout=30s backup;

  keepalive 32;
}

server {
  listen 80;
  server_name dashboard.yyc3.com;

  # 健康检查端点
  location /api/health {
    proxy_pass http://yyc3_backend;
    proxy_set_header Host $host;
    access_log off;
  }

  # 主应用代理
  location / {
    proxy_pass http://yyc3_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    # 超时设置
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
  }

  # WebSocket 支持
  location /ws {
    proxy_pass http://yyc3_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 86400;
  }

  # 静态资源缓存
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    proxy_pass http://yyc3_backend;
    expires 365d;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # 限流配置
  limit_req_zone $binary_remote_addr zone=yyc3_limit:10m rate=10r/s;

  location /api/ {
    limit_req zone=yyc3_limit burst=20 nodelay;
    proxy_pass http://yyc3_backend;
  }

  # Gzip 压缩
  gzip on;
  gzip_types text/plain application/json application/javascript text/css image/svg+xml;
  gzip_min_length 1000;
  gzip_comp_level 6;

  # 安全头
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

# Cloudflare 负载均衡配置
# -------------------------

## Pool 配置（源服务器池）
{
  "name": "yyc3-primary-pool",
  "origins": [
    {
      "name": "yyc3-server-1",
      "address": "10.0.1.10",
      "enabled": true,
      "weight": 100
    },
    {
      "name": "yyc3-server-2",
      "address": "10.0.1.11",
      "enabled": true,
      "weight": 100
    }
  ],
  "monitor": "yyc3-health-check"
}

## Load Balancer 配置
{
  "name": "yyc3-lb",
  "fallback_pool": "yyc3-fallback-pool",
  "default_pools": [
    "yyc3-primary-pool"
  ],
  "region_pools": {},
  "pop_pools": {},
  "rules": [
    {
      "enabled": true,
      "priority": 1
    }
  ]
}

# 监控与告警
# ----------

## CloudWatch 告警规则
resource "aws_cloudwatch_metric_alarm" "yyc3_high_latency" {
  alarm_name          = "yyc3-high-latency"
  comparison_operator = "GreaterThanThreshold"
  evaluation_periods  = "2"
  metric_name         = "TargetResponseTime"
  namespace           = "AWS/ApplicationELB"
  period              = "120"
  statistic           = "Average"
  threshold           = "1"
  alarm_description   = "ALB 响应时间超过 1 秒"
  alarm_actions       = [aws_sns_topic.alerts.arn]
  dimensions = {
    TargetGroup = aws_lb_target_group.yyc3_tg.arn_suffix
  }
}

## 健康检查失败告警
resource "aws_cloudwatch_metric_alarm" "yyc3_unhealthy_hosts" {
  alarm_name          = "yyc3-unhealthy-hosts"
  comparison_operator = "GreaterThanThreshold"
  evaluation_periods  = "2"
  metric_name         = "UnHealthyHostCount"
  namespace           = "AWS/ApplicationELB"
  period              = "60"
  statistic           = "Maximum"
  threshold           = "0"
  alarm_actions       = [aws_sns_topic.alerts.arn]
  dimensions = {
    TargetGroup = aws_lb_target_group.yyc3_tg.arn_suffix
  }
}
